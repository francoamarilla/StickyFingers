services:
  postgres:
    image: postgres:16-alpine
    container_name: sticky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sticky}
      POSTGRES_USER: ${DB_USER:-sticky}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sticky}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - sticky_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sticky} -d ${DB_NAME:-sticky}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sticky_pgdata:
