spring:
  application:
    name: sticky-burgers-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# Configuración común de la aplicación
sticky:
  # Precio del medallón extra por unidad de línea (en pesos)
  medallon-precio: 3500
  # Radio máximo de reparto en km y ubicación del local (Buenos Aires 1058, Córdoba Capital)
  delivery:
    radio-max-km: 3
    origen-lat: -31.4265
    origen-lng: -64.1888
  # Autenticación admin (JWT)
  jwt:
    # Secreto HMAC. Sobreescribir en prod vía variable de entorno JWT_SECRET.
    secret: ${JWT_SECRET:ZmFsbGJhY2stZGV2LXNlY3JldC1jaGFuZ2UtbWUtc3RpY2t5LWJ1cmdlcnMtMjU2Yml0c30}
    # Expiración del token en milisegundos (8 horas)
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  # Credenciales del admin sembrado al iniciar (si no existe).
  # Sin default a propósito: definí ADMIN_USERNAME / ADMIN_PASSWORD en el entorno
  # antes de arrancar. Si faltan, la app no levanta (fail-fast, no se commitean secretos).
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  # Orígenes permitidos para CORS y WebSocket (front Angular). En prod: CORS_ORIGINS.
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sticky}
    username: ${DB_USER:sticky}
    password: ${DB_PASSWORD:sticky}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true

server:
  # Respeta X-Forwarded-* del proxy de Coolify/Traefik (https y host correctos).
  forward-headers-strategy: framework
