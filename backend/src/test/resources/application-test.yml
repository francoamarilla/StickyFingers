spring:
  datasource:
    url: jdbc:h2:mem:sticky;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

sticky:
  medallon-precio: 3500
  delivery:
    radio-max-km: 3
