spring:
  datasource:
    url: jdbc:h2:mem:sticky;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true   # correr schema.sql (secuencia) después del create-drop
  sql:
    init:
      mode: always
  flyway:
    enabled: false

sticky:
  medallon-precio: 3500
  delivery:
    radio-max-km: 3
    origen-lat: -31.4265
    origen-lng: -64.1888
  jwt:
    secret: dGVzdC1zZWNyZXQtc3RpY2t5LWJ1cmdlcnMtMjU2LWJpdHMtbWluaW11bS1sZW5ndGgtb2s
    expiration-ms: 3600000
  admin:
    username: admin
    password: admin123
