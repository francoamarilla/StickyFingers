<div class="page">
  <header class="topbar">
    <button type="button" class="back" (click)="volver()" aria-label="Volver">‹</button>
    <h1 class="font-anton">FINALIZAR</h1>
  </header>

  <main>
    <section>
      <h2 class="label font-anton">TUS DATOS</h2>
      <input class="in" placeholder="Nombre y apellido" [ngModel]="nombre()" (ngModelChange)="nombre.set($event)" />
      <input class="in" inputmode="numeric" placeholder="Teléfono / WhatsApp" [ngModel]="telefono()" (ngModelChange)="telefono.set($event)" />
    </section>

    <section>
      <h2 class="label font-anton">ENTREGA</h2>
      <div class="seg">
        <button type="button" [class.on]="!esDelivery()" (click)="setEntrega('RETIRO')">Retiro en local</button>
        <button type="button" [class.on]="esDelivery()" (click)="setEntrega('DELIVERY')">Delivery</button>
      </div>

      @if (esDelivery()) {
        <input class="in" placeholder="Calle y numeración, piso y depto (ej.: Av. Colón 1234, piso 3, depto B)" autocomplete="off" [ngModel]="direccion()" (ngModelChange)="direccion.set($event)" />
        <p class="hint">El costo de envío lo coordina el local con vos.</p>
      }
    </section>

    <section>
      <h2 class="label font-anton">PAGO</h2>
      <div class="seg">
        <button type="button" [class.on]="medioPago() === 'EFECTIVO'" (click)="setPago('EFECTIVO')">Efectivo</button>
        <button type="button" [class.on]="medioPago() === 'TRANSFERENCIA'" (click)="setPago('TRANSFERENCIA')">Transferencia</button>
      </div>
      <p class="nota-pago">Sin recargo por medio de pago.</p>
    </section>

    <section>
      <h2 class="label font-anton">NOTA GENERAL</h2>
      <textarea class="in" rows="2" placeholder="Horario deseado, referencias del domicilio, etc." [ngModel]="notaGeneral()" (ngModelChange)="notaGeneral.set($event)"></textarea>
    </section>

    <div class="resumen">
      <div class="fila"><span>Subtotal</span><span>{{ cart.subtotal() | money }}</span></div>
      @if (esDelivery()) {
        <div class="fila"><span>Envío</span><span>a coordinar</span></div>
      }
      <div class="fila total">
        <span class="font-anton">TOTAL</span>
        <span class="font-anton monto">{{ total() | money }}</span>
      </div>
    </div>
  </main>

  <footer class="barra">
    <button type="button" class="cta font-anton" [disabled]="!puedeConfirmar()" (click)="confirmar()">
      {{ enviando() ? 'ENVIANDO…' : 'CONFIRMAR PEDIDO · ' + (total() | money) }}
    </button>
  </footer>
</div>
